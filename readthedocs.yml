# Read the Docs build configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py

# Install the package (for numpy/scipy/opt_einsum and autosummary introspection;
# psi4 is conda-only and is mocked in docs/conf.py) plus the Sphinx build tools.
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt
