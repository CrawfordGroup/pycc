name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  schedule:
    - cron: "0 0 * * *"

jobs:
  test:
    defaults:
      run:
        shell: bash -l {0}

    name: PyCC Test ${{ matrix.os }}, Py ${{ matrix.python-version }}, torch=${{ matrix.torch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macOS-latest, ubuntu-latest]
        python-version: ['3.11']
        # Run without torch (covers the HAS_TORCH=False CPU paths) and, on Linux
        # only, with a CPU-only torch (covers the torch/"GPU" code path on CPU --
        # no CUDA needed; this is the lane that catches torch-API regressions like
        # the torch.zero_like bug). gpu-marked tests skip on the torch=false legs.
        torch: [false, true]
        exclude:
          # Keep the CPU-torch lane Linux-only to limit CI cost; the torch code
          # path is OS-independent enough that one OS suffices to catch API bugs.
          - os: macOS-latest
            torch: true


    steps:
    - uses: actions/checkout@v3

    - name: Additional info about the build
      shell: bash
      run: |
        uname -a
        df -h
        ulimit -a


    - name: Create Psi4 Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: "latest"
        activate-environment: p4env
        environment-file: devtools/conda-envs/psi.yaml
        python-version: ${{ matrix.python-version }}
        auto-activate-base: false

    - name: Install Psi4
      run: |
        conda info
        conda list --show-channel-urls
        hash -r
        env
        conda install psi4 python=${{ matrix.python-version }} pip numpy=2 -c conda-forge
        ls -l $CONDA

    - name: Test Psi4 Python Loading
      if: false
      run: |
        export PATH=$CONDA_PREFIX/bin:$PATH
        export PYTHONPATH=$CONDA_PREFIX/lib:$PYTHONPATH
        python -c 'import psi4;print(psi4.__file__, psi4.__version__)' || true

    - name: Install PyCC and Deps
      run: |
        pip install -e .
        pip install pytest

    - name: Install PyTorch (CPU build) for the torch code path
      if: ${{ matrix.torch }}
      run: |
        # CPU-only wheel: small, no CUDA. The Linux default torch wheel bundles
        # CUDA (~2 GB) and is unnecessary here; macOS wheels are CPU/MPS already.
        if [ "$RUNNER_OS" == "Linux" ]; then
          pip install torch --index-url https://download.pytorch.org/whl/cpu
        else
          pip install torch
        fi
        python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available())"

    - name: Conda environment & Test Psi4 Python Loading
      run: |
        conda info
        conda list
        python -c 'import psi4;print(psi4.__file__, psi4.__version__, psi4.executable)' || true
        python -c "import pycc;print(pycc.__file__)" || true
        which conda python psi4 pytest
        psi4 --module

    - name: Test and generate coverage report
      run: |
        export KMP_DUPLICATE_LIB_OK=TRUE
        pip install coverage
        coverage run -m pytest
        coverage xml
        ls -l

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
